name: Build Demo APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build demo APK
        run: |
          chmod +x gradlew
          ./gradlew :demo:assembleDebug --no-daemon --stacktrace

      - name: Upload demo APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: demo-apk
          path: demo/build/outputs/apk/debug/demo-debug.apk
          retention-days: 30

      - name: Create or update rolling release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Demo APK
          body: |
            Auto-built demo APK from `${{ github.sha }}`.

            **Download:** [demo-debug.apk](https://github.com/${{ github.repository }}/releases/download/latest/demo-debug.apk)
          files: demo/build/outputs/apk/debug/demo-debug.apk
          prerelease: true
          make_latest: true
