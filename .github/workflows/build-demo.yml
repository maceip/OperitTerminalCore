name: Build Demo APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build demo APK
        run: |
          chmod +x gradlew
          ./gradlew :demo:assembleDebug --no-daemon --stacktrace

      - name: Upload demo APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: demo-apk
          path: demo/build/outputs/apk/debug/demo-debug.apk
          retention-days: 30

      - name: Create or update rolling release
        if: success() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete old release and tag if they exist
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          # Create new release with APK
          gh release create latest \
            demo/build/outputs/apk/debug/demo-debug.apk \
            --title "Latest Demo APK" \
            --notes "Auto-built from \`${{ github.sha }}\`" \
            --prerelease
